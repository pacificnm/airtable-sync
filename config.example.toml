[csv]
location_data_file = "/path/to/location.csv"
space_data_file = "/path/to/space.csv"

[database]
provider = "sqlite"
database_path = "/path/to/airtable-sync.db"
schema = "./schema/airtable-sync.sql"

[logging]
level = "info"
directory = "./logs"
