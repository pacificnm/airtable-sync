# Copy to config.toml and set paths, base_id, table_id values, and your token.
# config.toml is gitignored — store secrets there, not in git.

[airtable]
api_url = "https://api.airtable.com/v0"
# token = "pat..."                    # preferred: token directly in config.toml
token_env = "AIRTABLE_TOKEN"          # alternate: environment variable name
base_id = "appXXXXXXXXXXXXXX"

[sync]
dry_run = true
continue_on_error = true
max_parallel_tables = 2
max_parallel_updates = 5
create_change_plan = true

[airtable.tables.business_unit]
table_id = "tblXXXXXXXXXXXXXX"
sync = true

[airtable.tables.service_line]
table_id = "tblXXXXXXXXXXXXXX"
sync = false

[airtable.tables.department]
table_id = "tblXXXXXXXXXXXXXX"
sync = false

[airtable.tables.teams]
table_id = "tblXXXXXXXXXXXXXX"
sync = false

[airtable.tables.service]
