# Patch Nest git deps to a sibling nest checkout (../nest) for local framework development.
[patch."https://github.com/pacificnm/nest.git"]
nest-airtable = { path = "../nest/modules/crates/nest-airtable" }
nest-cli = { path = "../nest/core/crates/nest-cli" }
nest-config = { path = "../nest/core/crates/nest-config" }
nest-core = { path = "../nest/core/crates/nest-core" }
nest-error = { path = "../nest/core/crates/nest-error" }
nest-http-client = { path = "../nest/core/crates/nest-http-client" }
nest-logging = { path = "../nest/core/crates/nest-logging" }
